<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyBookList</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="p-5">
  <div class="container">
    <h1 class="text-center mb-4">
      My<span class="text-primary">Book</span>List
    </h1>

    <!-- Form Section -->
    <div class="form-group mb-3">
      <input type="text" id="title" class="form-control mb-2" placeholder="Title" />
      <input type="text" id="author" class="form-control mb-2" placeholder="Author" />
      <input type="text" id="isbn" class="form-control mb-3" placeholder="ISBN#" />
      <button id="submit" class="btn btn-primary">Add Book</button>
    </div>

    <!-- Table Section -->
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>ISBN#</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="book-list"></tbody>
    </table>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
